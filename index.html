<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eJPTv2 Training System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>">
</head>
<body>
  <div id="app" class="hidden">
    <!-- HUD Bar -->
    <header id="hud">
      <div class="hud-left">
        <span class="hud-logo" onclick="window.location.hash='#/'">eJPTv2</span>
        <span class="hud-rank" id="hud-rank">Script Kiddie</span>
      </div>
      <div class="hud-center">
        <div class="hud-stat">
          <span class="hud-label">XP</span>
          <span class="hud-value" id="hud-xp">0</span>
        </div>
        <div class="hud-stat">
          <span class="hud-label">Level</span>
          <span class="hud-value" id="hud-level">1</span>
        </div>
        <div class="hud-stat">
          <span class="hud-label">Progress</span>
          <span class="hud-value" id="hud-progress">0%</span>
        </div>
        <div class="hud-stat streak-stat">
          <span class="streak-flame" id="streak-flame"></span>
          <span class="hud-value" id="hud-streak">0</span>
          <span class="hud-label">day streak</span>
        </div>
      </div>
      <div class="hud-right">
        <button id="sound-toggle" class="hud-btn" title="Toggle sound">🔊</button>
        <button id="terminal-toggle" class="hud-btn" title="Terminal (`)">⌨</button>
      </div>
    </header>

    <!-- Main Layout -->
    <div id="main-layout">
      <!-- Mission Map Sidebar -->
      <nav id="mission-map">
        <div class="map-header">
          <h2>Mission Map</h2>
          <button id="map-collapse" class="map-toggle">◀</button>
        </div>
        <div class="map-content" id="map-content">
          <!-- Generated by JS -->
        </div>
      </nav>

      <!-- Content Viewport -->
      <main id="viewport">
        <!-- Welcome screen or lesson content -->
      </main>
    </div>

    <!-- Terminal Panel -->
    <div id="terminal-panel" class="terminal-hidden">
      <div class="terminal-header">
        <span>Terminal</span>
        <button id="terminal-close" class="terminal-close-btn">✕</button>
      </div>
      <div class="terminal-output" id="terminal-output"></div>
      <div class="terminal-input-line">
        <span class="terminal-prompt">root@ejpt:~# </span>
        <input type="text" id="terminal-input" class="terminal-input" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <!-- Quiz Overlay -->
    <div id="quiz-overlay" class="overlay-hidden">
      <div class="quiz-container" id="quiz-container">
        <!-- Generated by quiz engine -->
      </div>
    </div>

    <!-- XP Toast -->
    <div id="xp-toast" class="toast-hidden">
      <span id="xp-toast-text">+0 XP</span>
    </div>

    <!-- Level Up Modal -->
    <div id="levelup-modal" class="overlay-hidden">
      <div class="levelup-content">
        <div class="levelup-icon">⬆</div>
        <h2>LEVEL UP!</h2>
        <p class="levelup-rank" id="levelup-rank"></p>
        <p class="levelup-level" id="levelup-level"></p>
        <button class="btn-primary" id="levelup-dismiss">Continue</button>
      </div>
    </div>

    <!-- Navigation Bar -->
    <footer id="nav-bar">
      <button id="nav-prev" class="nav-btn" disabled>← Previous</button>
      <button id="nav-map" class="nav-btn" onclick="window.location.hash='#/'">Mission Map</button>
      <button id="nav-next" class="nav-btn">Next →</button>
    </footer>
  </div>

  <!-- Boot Screen -->
  <div id="boot-screen">
    <div class="boot-terminal">
      <div id="boot-lines"></div>
      <span class="boot-cursor">█</span>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
